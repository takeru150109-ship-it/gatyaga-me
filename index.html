<style>

body{
margin:0;
background:#12121a;
color:white;
font-family:sans-serif;
text-align:center;
overflow-x:hidden;
}

#titleScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(#1d1d30,#090910);
}

#gameScreen{
display:none;
padding-bottom:100px;
}

.topbar{
background:#1d1d30;
padding:10px;
position:sticky;
top:0;
z-index:100;
}

button{
border:none;
border-radius:10px;
padding:10px;
background:#4b6cff;
color:white;
font-weight:bold;
margin:3px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#2a2a40;
border-radius:14px;
padding:8px;
font-size:12px;
}

.N{border:2px solid gray;}
.R{border:2px solid cyan;}
.SR{
border:2px solid violet;
box-shadow:0 0 10px violet;
}
.LR{
border:2px solid gold;
box-shadow:0 0 10px gold;
}
.SECRET{
border:2px solid red;
box-shadow:0 0 15px red;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.03);}
}

.lock{
opacity:0.25;
filter:grayscale(100%);
}

img{
width:80px;
height:80px;
object-fit:contain;
background:white;
border-radius:10px;
}

.tapBtn{
font-size:28px;
padding:20px 40px;
margin-top:20px;
}

#menu{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#1a1a28;
z-index:999;
overflow-x:auto;
}

#menu button{
flex:1;
font-size:10px;
border-radius:0;
margin:0;
padding:12px 4px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#101018;
display:none;
flex-direction:column;
overflow-y:auto;
z-index:9999;
padding-bottom:100px;
}

.closeBtn{
margin:20px;
}

#effect{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:32px;
font-weight:bold;
color:gold;
pointer-events:none;
opacity:0;
transition:0.3s;
z-index:99999;
}

.secretText{
color:red;
font-weight:bold;
}

input,select{
padding:8px;
border-radius:8px;
border:none;
margin:5px;
}

#gachaEffect{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999999;
animation:fadeIn 0.3s;
}

#gachaFlash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
}

#gachaResult{
font-size:40px;
font-weight:bold;
animation:pop 0.5s;
}

.gachaN{
color:gray;
}

.gachaR{
color:cyan;
}

.gachaSR{
color:violet;
text-shadow:0 0 20px violet;
}

.gachaLR{
color:gold;
text-shadow:0 0 30px gold;
}

.gachaSECRET{
color:red;
text-shadow:0 0 40px red;
animation:secretShake 0.1s infinite;
}

@keyframes pop{
0%{
transform:scale(0);
}
100%{
transform:scale(1);
}
}

@keyframes fadeIn{
from{
opacity:0;
}
to{
opacity:1;
}
}

@keyframes secretShake{
0%{transform:translateX(-3px);}
50%{transform:translateX(3px);}
100%{transform:translateX(-3px);}
}

</style>

function newGame(){

try{

localStorage.removeItem("tycoonSave");

}catch(e){

console.log(e);

}

gameData={
coins:0,
rp:0,
chars:{},
collection:{},
party:[],
materials:{}
};

rpUp={
click:0,
auto:0,
gacha:0
};

bossKills=0;
tapCount=0;
achievementGet={};

startGame();
update();

}

function continueGame(){

let save = localStorage.getItem("tycoonSave");

if(save){

let data = JSON.parse(save);

gameData = data.gameData;
rpUp = data.rpUp;
bossKills = data.bossKills;
tapCount = data.tapCount;
achievementGet = data.achievementGet;

startGame();
update();

}else{

alert("セーブがありません");

}

}

function startGame(){

titleScreen.style.display="none";

gameScreen.style.display="block";

}

try{

localStorage.setItem(
"tycoonSave",

JSON.stringify({
gameData,
rpUp,
bossKills,
tapCount,
achievementGet
})

);

}catch(e){

console.log("セーブ失敗");

}

}

function playGachaEffect(char){

gachaEffect.style.display="flex";

gachaResult.className=
"gacha"+char.rarity;

gachaResult.innerHTML=`

<img src="${char.img}"
style="
width:200px;

}

async function playMultiGacha(chars){

skipBtn.style.display="block";

skipGacha=false;

gachaResults=[];

gachaEffect.style.display="flex";

for(let c of chars){

gachaResults.push(c);

gachaResult.className="gacha"+c.rarity;

gachaResult.innerHTML=`

<br>

${c.rarity}

<br>

${c.name}

<br>

${c.isNew ? 'NEW!' : ''}

`;

gachaFlash.style.opacity="1";

setTimeout(()=>{
gachaFlash.style.opacity="0";
},80);

if(!skipGacha){

if(c.rarity==="LR" || c.rarity==="SECRET"){

await new Promise(r=>setTimeout(r,1500));

}else{

await new Promise(r=>setTimeout(r,250));

}

}

}

skipBtn.style.display="none";

gachaEffect.style.display="none";

showResults();
}

// ====================
// 倍率
// ====================

function getMulti(){

let m=0;

gameData.party.forEach(n=>{

let c=gameData.chars[n];

let d=charList.find(x=>x.name===n);

if(c){

let power =
d.multi * (1 + c.lv * 0.2);
if(c.awake){

power*=d.awake.multi;

}

m+=power;

}

});

return Math.max(1,m)*(1+rpUp.click);

}

tapCount++;

gameData.coins+=gain;

showEffect("+"+Math.floor(gain));

update();

}

// ガチャ

function randomChar(){

let complete=true;

charList.forEach(c=>{

if(c.rarity!=="SECRET"){

if(!gameData.collection[c.name]){

complete=false;

}

}

});

if(complete){

if(Math.random()*1000000<1){

return charList.find(
c => c.name === "創造神"
);

}

}

let rand=Math.random()*100;

let sum=0;

for(let r in rarityRates){

sum+=rarityRates[r];

if(rand<sum){

let pool=charList.filter(c=>c.rarity===r);

return pool[Math.floor(Math.random()*pool.length)];

}

}

// 保険
return charList[0];

}

// ====================
// キャラ追加
// ====================

function addChar(c){

c.isNew=!gameData.collection[c.name];

if(!gameData.chars[c.name]){

gameData.chars[c.name]={
count:0,
lv:1,
exp:0
};

}

let data=gameData.chars[c.name];

data.count++;

data.exp++;

if(data.exp>=data.lv*5){

data.exp=0;

data.lv++;

showEffect(c.name+" LvUP!");

}

gameData.collection[c.name]=true;

showEffect(c.rarity+" "+c.name);

}

// ガチャ
// ====================

function gacha(){

let cost=
Math.max(10,100-rpUp.gacha*5);

if(gameData.coins<cost)return;

gameData.coins-=cost;

let c=randomChar();

addChar(c);

playGachaEffect(c);

update();

}

function gacha10(){

if(gameData.coins<1000)return;

gameData.coins-=1000;

let results=[];

for(let i=0;i<10;i++){

let c=randomChar();

results.push(c);

addChar(c);

}

playMultiGacha(results);

update();

}

let results=[];

for(let i=0;i<100;i++){

let c=randomChar();

results.push(c);

update();

}

function attackBoss(){

let dmg=getMulti(); 

bossData.hp-=dmg;

if(bossData.hp<0){

bossData.hp=0;

}

showEffect("-"+Math.floor(dmg));

if(bossData.hp<=0){

// ====================
// 素材ドロップ
// ====================

let dropPool=[];

// N素材
if(
bossData.name==="ゴブリン王" ||
bossData.name==="巨大スライム"

charList.filter(
c=>c.rarity==="N"
);
}

// R素材
if(
bossData.name==="オーク将軍" ||
bossData.name==="ドラゴン" ||
bossData.name==="死神"
){
dropPool=
charList.filter(
c=>c.rarity==="R"
);
}

// SR素材
if(
bossData.name==="魔王" ||
bossData.name==="終焉龍" ||
bossData.name==="天界神"
){
dropPool=
charList.filter(
c=>c.rarity==="SR"
);
}

// LR素材
if(
bossData.name==="虚無神" ||
bossData.name==="創造神"
){
dropPool=
charList.filter(
c=>c.rarity==="LR"
);
}

// ドロップ
if(dropPool.length>0){

// 30%ドロップ
if(Math.random()<0.3){

let dropChar=
dropPool[
Math.floor(
Math.random()*dropPool.length
)
];

let materialName=
dropChar.awake.need;

if(!gameData.materials){
gameData.materials={};
}

if(!gameData.materials[materialName]){
gameData.materials[materialName]=0;
}

gameData.materials[materialName]++;

showEffect(
materialName+" GET!"
);

}

}

gameData.coins += bossData.reward;
bossKills++;

showEffect("撃破!");

bossIndex++;

if(bossIndex>=bossList.length){
bossIndex=0;
}

let next=bossList[bossIndex];

bossData={
name:next.name,
hp:next.hp,
maxHp:next.hp,
reward:next.reward
};

renderBoss();
update();

}

renderBoss();
update();

}

function evolve(name){

let evo=evolutions.find(x=>x.from===name);

if(!evo)return;

let data=gameData.chars[name];

if(data.lv<evo.needLv){

alert("Lv不足");

return;

}

delete gameData.chars[name];

gameData.chars[evo.to]={

count:1,
lv:1,
exp:0

};

// パーティ更新
gameData.party =
gameData.party.filter(
x=>x!==name
);

if(gameData.party.length<5){

gameData.party.push(evo.to);

}

gameData.collection[evo.to]=true;

showEffect(evo.to+" に進化!");

renderEvolution();

update();

}

function awakeChar(name){

let c=charList.find(x=>x.name===name);

let data=gameData.chars[name];

if(data.awake){

alert("既に覚醒済み");

return;

}

if(!c.awake)return;

let matName=c.awake.need;

let need=c.awake.count;

let have=gameData.materials[matName]||0;

if(have<need){

alert("素材不足");

return;

}

gameData.materials[matName]-=need;

data.awake=true;

showEffect(name+" 覚醒!");

renderAwake();

update();

}

materialUI.style.display="none";

}

function renderMaterial(){

materialList.innerHTML="";

if(!gameData.materials){

gameData.materials={};

}

let keys=Object.keys(gameData.materials);

if(keys.length===0){

materialList.innerHTML="素材を持っていません";

return;

}

keys.forEach(m=>{

let amount = gameData.materials[m];

let mat = materialData.find(x => x.name === m);

materialList.innerHTML += `

<div class="card">

<img
src="${mat?.img || 'images/none.png'}"
onerror="this.src='images/none.png'"
>

<br>

${m}

<br>

x${amount}

</div>

`;

});

}

// ====================
// 転生
// ====================

function rebirth(){

if(gameData.coins<10000)return;

let gain=
Math.floor(
gameData.coins/10000
);

gameData.rp+=gain;

gameData.coins=0;

gameData.chars={};

gameData.party=[];

showEffect(
"転生! +"+gain+"RP"
);

update();

}

// ====================
// 管理者
// ====================

function openAdmin(){

let code=
adminCode.value;

if(code!==ADMIN_CODE){

alert("コードが違います");

return;

}

adminUI.style.display="flex";

adminCharSelect.innerHTML="";

charList.forEach(c=>{

adminCharSelect.innerHTML+=`

<option value="${c.name}">
${c.name}
</option>

`;

});

}

function closeAdmin(){

adminUI.style.display="none";

}

function addCoinsAdmin(){

gameData.coins+=
Number(addCoinValue.value);

update();

}

function addRPAdmin(){

gameData.rp+=
Number(addRPValue.value);

update();

}

function giveCharAdmin(){

let n=
adminCharSelect.value;

let c=
charList.find(x=>x.name===n);

addChar(c);

update();

}

// ====================
// 自動収入
// ====================

setInterval(()=>{

gameData.coins
+=rpUp.auto*2;

update();

},1000);

// ====================
// キャラ詳細
// ====================

let currentDetail=null;

function openDetail(name){

currentDetail=name;

detailUI.style.display="flex";

renderDetail();

}

function closeDetail(){

detailUI.style.display="none";

}

function renderDetail(){

let data=
gameData.chars[currentDetail];

let d=
charList.find(
x=>x.name===currentDetail
);

if(!data)return;

let rarityCost=1;

if(d.rarity==="R") rarityCost=2;
if(d.rarity==="SR") rarityCost=5;
if(d.rarity==="LR") rarityCost=12;
if(d.rarity==="SECRET") rarityCost=50;

let coinCost=
Math.floor(
100*
data.lv*
rarityCost
);

let rpCost=
Math.max(
1,
Math.floor(data.lv/5)
*
rarityCost
);

detailContent.innerHTML=`

<div class="card ${d.rarity}">

<img
src="${d.img}"
style="
width:150px;
height:150px;
"
>

<h2>${d.name}</h2>

<p>
レア度:${d.rarity}
</p>

<p>
Lv:${data.lv}
</p>

<p>
EXP:
${data.exp}/${data.lv*5}
</p>

<p>
所持数:${data.count}
</p>

<p>
倍率:
x${(
d.multi*
(1+data.lv*0.1)
).toFixed(1)}
</p>

<hr>

<h3>コイン強化</h3>

<p>
必要コイン:
${coinCost}
</p>

<button onclick="levelUpCoin()">
レベルアップ
</button>

<hr>

<h3>RP強化</h3>

<p>
必要RP:
${rpCost}
</p>

<button onclick="levelUpRP()">
超強化
</button>

</div>

`;

}

// コイン強化
function levelUpCoin(){

let data=
gameData.chars[currentDetail];

let d=
charList.find(
x=>x.name===currentDetail
);

let rarityCost=1;

if(d.rarity==="R") rarityCost=2;
if(d.rarity==="SR") rarityCost=5;
if(d.rarity==="LR") rarityCost=12;
if(d.rarity==="SECRET") rarityCost=50;

let cost=
Math.floor(
100*
data.lv*
rarityCost
);

if(gameData.coins<cost){

alert("コイン不足");

return;

}

gameData.coins-=cost;

data.lv++;

showEffect(
d.name+" LvUP!"
);

renderDetail();

update();

}

function showResults(){

resultUI.style.display="flex";

resultList.innerHTML="";

gachaResults.forEach(c=>{

resultList.innerHTML+=`

<div class="card ${c.rarity}">

<img src="${c.img}">

<br>

${c.name}

<br>

${c.isNew ? 'NEW!' : ''}

</div>

`;

});

}

// RP強化
function levelUpRP(){

let data=
gameData.chars[currentDetail];

let d=
charList.find(
x=>x.name===currentDetail
);

let rarityCost=1;

if(d.rarity==="R") rarityCost=2;
if(d.rarity==="SR") rarityCost=5;
if(d.rarity==="LR") rarityCost=12;
if(d.rarity==="SECRET") rarityCost=50;

let cost=
Math.max(
1,
Math.floor(data.lv/5)
*
rarityCost
);

if(gameData.rp<cost){

alert("RP不足");

return;

}

gameData.rp-=cost;

data.lv+=3;

showEffect(
d.name+" 超強化!"
);

renderDetail();

update();

}

// ====================
// 更新
// ====================

function update(){

coins.innerHTML=Math.floor(gameData.coins);

rp.innerHTML=gameData.rp;

info.innerHTML="編成:"+gameData.party.length+"/5";

cards.innerHTML="";

for(let c in gameData.chars){

let d=charList.find(x=>x.name===c);

if(!d)continue;

let data=gameData.chars[c];

cards.innerHTML += `

<div
class="card ${d.rarity}"
onclick="openDetail('${c}')"
>

<img
src="${d.img}"
onerror="this.src='images/none.png'"
>

<br>

${c}

<br>

${data.awake ? "🔥覚醒済み" : ""}

<br>

Lv ${data.lv}

<br>

EXP:
${data.exp}/${data.lv*5}

<br>

x${data.count}

</div>

`;

}

}

setInterval(()=>{

saveGame();

},5000);

</script>

</body>
</html>
